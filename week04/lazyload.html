<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/CSS/lazyload.css">
</head>
<body>
    <header>
        <h1>Lazy Load Demonstration</h1>
    </header>
    <main>
        <picture>
            <img src="https://placekittens.com/400/600" alt="Place Holder Kitten Image" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="https://placekittens.com/400/700" alt="Place Holder Kitten Image" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="https://placekittens.com/400/800" alt="Place Holder Kitten Image" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="https://placekittens.com/400/650" alt="Place Holder Kitten Image" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="https://placekittens.com/400/750" alt="Place Holder Kitten Image" loading="lazy" width="400" height="600">
        </picture>
        <picture>
            <img src="https://placekittens.com/400/850" alt="Place Holder Kitten Image" loading="lazy" width="400" height="600">
        </picture>
    </main>
</body>
</html>
